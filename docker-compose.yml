services:
  postgres:
    image: postgres:16-alpine
    container_name: sd4a_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: sd4a_user
      POSTGRES_PASSWORD: sd4a_password
      POSTGRES_DB: sd4a_portal
      POSTGRES_HOST_AUTH_METHOD: md5
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sd4a_user -d sd4a_portal"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: sd4a_api
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://sd4a_user:sd4a_password@postgres:5432/sd4a_portal
    ports:
      - "8000:8000"
    volumes:
      - ./apps/api:/app
    depends_on:
      postgres:
        condition: service_healthy
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: sd4a_web
    restart: unless-stopped
    env_file: .env
    environment:
      API_URL: http://api:8000
    ports:
      - "3000:3000"
    volumes:
      - ./apps/web:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - api

volumes:
  postgres_data:
